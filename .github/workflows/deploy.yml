name: Deploy to Azure Web App

on:
  push:
    branches:
      - main  # Укажите вашу ветку: main или master

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Log in to Azure
      uses: azure/login@v2
      with:
        client-id: 'deaa059c-f985-49cc-8478-f6cde9231c01'
        tenant-id: 'd01d0419-9226-4f37-b3eb-15085044d5c7'
        subscription-id: '037b7212-5a93-43af-adc2-05470cf079cf'

    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v3
      with:
        app-name: 'mySiteHanna'
        package: '.'  # Отправляет текущую папку с HTML-файлами напрямую
